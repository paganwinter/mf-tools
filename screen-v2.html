function parseCategory(amfiCat) {
  let [, type, category] = amfiCat.match(/(.+?)\((.+)\)/)
  // let [scheme, category] = schemeCategory.split(' - ')
  // if (!category) category = scheme
  let [scheme] = category.split(' - ')
  return { type, scheme, category }
}
function parseAMFIData(data) {
  data = data.replace(/\r?\n/g, '\n')
  let lines = data.split(/\n/)

  const funds = []
  let fundHouses = {}
  let rawCategories = {}
  let types = {}
  let schemes = {}
  let categories = {}

  const FUND_LINE_REGEX = /^\d+;/

  // below are set as and when those lines are encountered
  // and used by subsequent funds
  let currentFundHouse
  let currentRawCategory
  for (let i = 1; i < lines.length; i++) {
    let line = lines[i]

    // ignore empty lines
    if (line.match(/^\s+$/)) continue

    if (FUND_LINE_REGEX.test(line)) {
      // line with fund data
      let [code, isinDivPayGrowth, isiniDivReinvest, name, nav, date] = line.split(';')

      // fundHouse and rawCategory would have been set while parsing earlier lines
      const fundHouse = currentFundHouse
      const { type, scheme, category } = rawCategories[currentRawCategory]

      types[type] = true
      schemes[scheme] = true
      categories[category] = true

      // TODO
      // growth vs dividend
      // regular vs direct
      // let growth = !!name.match(/growth/i)

      let fund = {
        code,
        name,
        fundHouse,
        rawCategory: currentRawCategory,
        type,
        scheme,
        category,
        nav,
        date,
        isinDivPayGrowth,
        isiniDivReinvest
      }
      funds.push(fund)
    } else if (lines[i + 1] === ' ' && FUND_LINE_REGEX.test(lines[i + 2])) {
      // line with fund house name
      currentFundHouse = line
      fundHouses[currentFundHouse] = true
    } else if (lines[i + 1] === ' ' && lines[i + 3] === ' ') {
      // line with category data
      currentRawCategory = line
      rawCategories[currentRawCategory] = parseCategory(currentRawCategory)
      // let categoryData = parseCategory(currentRawCategory)
    }
  }
  return {
    funds,
    fundHouses: Object.keys(fundHouses),
    types: Object.keys(types),
    schemes: Object.keys(schemes),
    categories: Object.keys(categories),
    rawCategories: Object.keys(rawCategories),
  }
}

async function getFundNAV(fund) {
  // console.log(`Getting NAV for ${fund.code} - ${fund.name}`)
  try {
    const navRaw = await fetch(`https://api.mfapi.in/mf/${fund.code}`).then(res => res.json())
    console.log(`Got NAV for ${fund.code} - ${fund.name}`, navRaw)
    const navs = navRaw.data.reverse().filter(({nav}) => +nav).map(({ date, nav }) => ({ date: new Date(date.split('-').reverse().join('-')), nav: +nav }));
    return navs
  } catch (error) {
    console.error(`Failed to get NAV for - ${fund.code} - ${fund.name}`)
    return []
  }
}

function colorGradient(fadeFraction, rgbColor1, rgbColor2, rgbColor3) {
  var color1 = rgbColor1;
  var color2 = rgbColor2;
  var fade = fadeFraction;

  // Do we have 3 colors for the gradient? Need to adjust the params.
  if (rgbColor3) {
    fade = fade * 2;

    // Find which interval to use and adjust the fade percentage
    if (fade >= 1) {
      fade -= 1;
      color1 = rgbColor2;
      color2 = rgbColor3;
    }
  }

  var diffRed = color2.red - color1.red;
  var diffGreen = color2.green - color1.green;
  var diffBlue = color2.blue - color1.blue;

  var gradient = {
    red: parseInt(Math.floor(color1.red + (diffRed * fade)), 10),
    green: parseInt(Math.floor(color1.green + (diffGreen * fade)), 10),
    blue: parseInt(Math.floor(color1.blue + (diffBlue * fade)), 10),
  };

  return 'rgb(' + gradient.red + ',' + gradient.green + ',' + gradient.blue + ')';
}

function getReturnsDistribution_(list, binSize) {
  const minVal = Math.min(...list);
  const maxVal = Math.max(...list);
  const startVal = Math.floor(minVal / binSize) * binSize;

  const histogram = {};

  // Iterate through each data point and assign it to a bin
  for (const num of list) {
    // Calculate the lower bound of the bin for the current number
    // Convention: a value falls into the bin that includes its lower bound but not its upper bound (e.g., [0, 5), [5, 10))
    const binStart = Math.floor(num / binSize) * binSize;
    const binEnd = binStart + binSize;
    // const binLabel = `${binStart}-${binEnd}`;
    const binLabel = binStart;

    // Increment the count for the corresponding bin
    if (histogram[binLabel]) {
      histogram[binLabel]++;
    } else {
      histogram[binLabel] = 1;
    }
  }

  // Ensure all potential bins from min to max are present in the output, even if frequency is 0
  let currentBinStart = startVal;
  while (currentBinStart <= maxVal) {
    // const binLabel = `${currentBinStart}-${currentBinStart + binSize}`;
    const binLabel = currentBinStart
    if (!histogram[binLabel]) {
      histogram[binLabel] = 0;
    }
    currentBinStart += binSize;
  }

  // return histogram;
  const percentages = {};
  const totalCount = list.length;
  for (const binLabel in histogram) {
    percentages[binLabel] = +((histogram[binLabel] / totalCount) * 100).toFixed(2);
  }
  return Object.entries(percentages).map(([ret, perc]) => ([+ret, perc])).sort((a, b) => a[0] - b[0]);
}
function getReturnsDistribution(list, binSize) {
  const histogram = {};
  list.forEach(value => {
    for (const band in HISTOGRAM_BANDS) {
      const [lower, upper] = HISTOGRAM_BANDS[band];
      if ((typeof lower === 'undefined' || value >= lower) && (typeof upper === 'undefined' || value < upper)) {
        histogram[band] = (histogram[band] || 0) + 1;
        break;
      }
    }
  })
  const percentages = {};
  const totalCount = list.length;
  for (const band in histogram) {
    percentages[band] = +((histogram[band] / totalCount) * 100).toFixed(2);
  }
  return Object.entries(percentages).map(([band, perc]) => ([band, perc])).sort((a, b) => a[0] - b[0]);
}


function calcAvg(values) {
  if (values.length === 0) return undefined
  return values.reduce((acc, item) => (acc + item), 0) / values.length
}
function calcMedian(values) {
  if (values.length === 0) return undefined
  return values.sort((a, b) => a - b)[Math.floor(values.length / 2)]
}
function calcQuantile(sortedArr, q) {
  // 1. Sort the array in ascending order
  // const sortedArr = arr.sort((a, b) => a - b);
  const pos = (sortedArr.length - 1) * q;
  const base = Math.floor(pos);
  const rest = pos - base; // the fractional part

  // 2. Linearly interpolate between the two nearest data points if needed
  if (sortedArr[base + 1] !== undefined) {
    return sortedArr[base] + rest * (sortedArr[base + 1] - sortedArr[base]);
  } else {
    return sortedArr[base];
  }
};

function calcStdev(values) {
  const n = values.length
  if (n === 0) return undefined
  if (n < 2) return 0

  const mean = calcAvg(values);
  const squareDiffs = values.map(value => {
    const diff = value - mean;
    return diff * diff;
  }, 0);
  const sumOfSquareDiffs = squareDiffs.reduce((sum, value) => {
    return sum + value;
  }, 0);
  // const variance = sumOfSquareDiffs / n;
  const variance = sumOfSquareDiffs / (n - 1);
  const stdev = Math.sqrt(variance);
  // return stdev * Math.sqrt(TRADING_DAYS_IN_YEAR); // annualized
  return stdev;
}

function getMonthEndNavs(navs) {
  const navMap = {};
  for (const item of navs) {
    const monthKey = item.date.toISOString().slice(0, 7); // YYYY-MM
    if (!navMap[monthKey] || item.date > navMap[monthKey].date) {
      navMap[monthKey] = item;
    }
  }
  // Sort by date ascending (optional but useful)
  return Object.values(navMap).sort((a, b) => a.date - b.date);
}

function fmtNum(n, dec = 2) {

    // TODO: calculate SIP returns XIRR
    const sipStartDateVal = new Date(sipStartDate);
    let sipReturns
    if (new Date(navs[0].date) <= sipStartDateVal) {
      let investedValue = 0
      let totalUnits = 0
      let currentValue = 0

      const installments = {};
      navs.forEach(item => {
        if (item.date < sipStartDateVal) return
        const monthKey = item.date.toISOString().slice(0, 7); // YYYY-MM
        if (!installments[monthKey] || installments[monthKey].date > item.date) {
          const unitsBought = fmtNum(sipAmount / item.nav, 4);
          totalUnits += unitsBought;
          investedValue += sipAmount;
          currentValue = fmtNum(totalUnits * item.nav, 2);

          installments[monthKey] = {
            date: item.date,
            nav: item.nav,
            unitsBought,
            totalUnits,
            investedValue,
            currentValue,
          };
        }
      })
      console.log('SIP Installments:', installments)
      curFundStats.sipReturns = {
        installments,
        currentValue,
        investedValue,
        totalUnits: fmtNum(totalUnits, 4),
        gain: fmtNum(currentValue - investedValue, 2),
        // returnPerc: investedValue ? fmtNum((currentValue - investedValue) / investedValue * 100, 2) : undefined,
      }
      // // Sort by date ascending (optional but useful)
      // return Object.values(navMap).sort((a, b) => a.date - b.date);
    }



    let rollingReturns = {};
    ROLLING_RETURNS_WINDOWS.forEach((windowYears) => {
      // const cagrs = calcRollingReturns({ fund, navs: navsFromStartDate, windowYears, startDate })
      const cagrs = calcRollingReturns({ navs: navsFromStartDate, windowYears })

      // if (cagrs.length < 100) {
      //   rollingReturns[`${windowYears}`] = {
      //     count: 0,
      //     distribution: [],
      //   }
      //   return
      // }

      rollingReturns[`${windowYears}`] = {
        values: cagrs,
        count: cagrs.length,
      }
      if (cagrs.length > 0) {
        const cagrValues = cagrs.map(i => i.cagr)
        const cagrValuesSorted = [...cagrValues].sort((a, b) => a - b)
        const distribution = getReturnsDistribution(cagrValuesSorted, HISTOGRAM_BIN_SIZE)
        console.log(fund.name, distribution)

        rollingReturns[`${windowYears}`] = {
          ...rollingReturns[`${windowYears}`],
          avg: fmtNum(calcAvg(cagrValues)),
          distribution,
          min: fmtNum(Math.min(...cagrValues)),
          max: (cagrValues.length > 0) && fmtNum(Math.max(...cagrValues)),
          median: fmtNum(calcMedian(cagrValues)),
          p50: fmtNum(calcQuantile(cagrValuesSorted, 0.5)),
          p25: fmtNum(calcQuantile(cagrValuesSorted, 0.25)),
          p10: fmtNum(calcQuantile(cagrValuesSorted, 0.1)),
          // stdev: fmtNum(calcStdev(cagrValues)),
        }
      }
    });
    curFundStats.rollingReturns = rollingReturns

    statsCache[fund.code] = { ...fund, stats: curFundStats }
    console.log(fund.code, fund.name, curFundStats);

    // update view
    setFunds((prevFunds) => {
      const updatedFunds = prevFunds.map((f) => {
        if (f.code === fund.code) return { ...f, stats: curFundStats }
        return f
      })
      return updatedFunds
    })
  }))
  setMessage('Done');


  // const chartData = funds.filter(f => statsCache[f.code]?.stats.rollingReturns[5].avg > 20).map(fund => {
  const chartFunds = funds.map(f => ({ ...f, stats: statsCache[f.code]?.stats }))
  drawChart({ funds: chartFunds, years: rrWindow, rankThreshold });



  // calculate relative stats
  console.log('statsCache:', statsCache)
  ROLLING_RETURNS_WINDOWS.forEach(years => {
    const avgRRs = Object.values(statsCache).map(f => f.stats.rollingReturns[years]?.avg).filter(v => typeof v !== 'undefined') // .sort((a, b) => b - a)
    const minRR = Math.min(...avgRRs)
    const maxRR = Math.max(...avgRRs)
    console.log({years, avgRRs, minRR, maxRR})
    console.log(Object.values(statsCache).map(f => f.stats.rollingReturns[years]))

    funds.forEach(fund => {
      if (!statsCache[fund.code].stats.rollingReturns[years]) return

      // let perc = statsCache[fund.code].stats.rollingReturns[years].avg / maxRR
      let perc = (statsCache[fund.code].stats.rollingReturns[years].avg - minRR) / (maxRR - minRR)
      perc = isNaN(perc) ? 0 : perc
      const color = colorGradient(perc, COLOR_LOW, COLOR_HIGH)

      setFunds((prevFunds) => {
        const updatedFunds = prevFunds.map((f) => {
          if (f.code === fund.code) {
            const stats = { ...f.stats };
            stats.rollingReturns[years].perc = perc
            stats.rollingReturns[years].color = color
            return { ...f, stats }
          }
          return f
        })
        return updatedFunds
      })

    })

    // avgRR.sort((a, b) => b.avgRR - a.avgRR)
    // avgRR.forEach((item, index) => {
    //   if (!statsCache[item.code].stats.rollingReturns[years]) return
    //   statsCache[item.code].stats.rollingReturns[years].rank = index + 1
    // })
  })
}
